    <circle cx="22" cy="42" r="9" fill="#D99B3E" stroke="#FFF"/><circle cx="213" cy="192" r="11" fill="#6E5A8D" stroke="#FFF" class="goal"/>
  </g>
  <g transform="translate(36 175)" font-family="ui-monospace,monospace" font-size="11"><rect width="218" height="82" rx="16" fill="#FFFDF7" stroke="#D8CFBD"/><text x="18" y="28" fill="#88724D">PLAYER ROUTE</text><text x="18" y="53" fill="#314B5C">DFS · BFS · A* REPLAY</text><circle cx="188" cy="41" r="17" fill="#E9F0F2"/><path d="M181 41L187 47L197 35" stroke="#547C9B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></g>
