<svg width="1200" height="330" viewBox="0 0 1200 330" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Praful A — digital atelier identity card</title>
  <desc id="desc">A light editorial identity card with a maker seal, elegant typography, and an animated ink line.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1200" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FBF8F1"/><stop offset="0.55" stop-color="#F6F1E6"/><stop offset="1" stop-color="#EEF3F4"/>
    </linearGradient>
    <linearGradient id="ink" x1="70" y1="0" x2="1115" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#1C2733"/><stop offset="0.52" stop-color="#56758C"/><stop offset="1" stop-color="#B38B42"/>
    </linearGradient>
    <filter id="texture" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence baseFrequency="0.7" numOctaves="3" seed="17" type="fractalNoise" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.045"/></feComponentTransfer>
    </filter>
    <filter id="soft"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>
  <style>
    .ink-line { stroke-dasharray: 12 9; animation: travel 16s linear infinite; }
    .seal-ring { transform-origin: 132px 165px; animation: turn 28s linear infinite; }
    .phrase-a { animation: phraseA 9s ease-in-out infinite; }
    .phrase-b { animation: phraseB 9s ease-in-out infinite; }
    .phrase-c { animation: phraseC 9s ease-in-out infinite; }
    .sun { animation: breathe 5s ease-in-out infinite; }
    @keyframes travel { to { stroke-dashoffset: -420; } }
    @keyframes turn { to { transform: rotate(360deg); } }
    @keyframes phraseA { 0%,28%{opacity:1;transform:translateY(0)} 34%,100%{opacity:0;transform:translateY(-8px)} }
    @keyframes phraseB { 0%,28%{opacity:0;transform:translateY(8px)} 34%,61%{opacity:1;transform:translateY(0)} 67%,100%{opacity:0;transform:translateY(-8px)} }
    @keyframes phraseC { 0%,61%{opacity:0;transform:translateY(8px)} 67%,94%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-8px)} }
    @keyframes breathe { 0%,100%{opacity:.22} 50%{opacity:.45} }
    @media (prefers-reduced-motion: reduce){.ink-line,.seal-ring,.phrase-a,.phrase-b,.phrase-c,.sun{animation:none}.phrase-b,.phrase-c{display:none}}
  </style>

  <rect x="8" y="8" width="1184" height="314" rx="30" fill="url(#paper)" stroke="#CDBB98" stroke-width="1.5"/>
  <rect x="8" y="8" width="1184" height="314" rx="30" fill="#111827" filter="url(#texture)" opacity="0.7"/>
  <circle cx="1005" cy="42" r="150" fill="#E9C77A" opacity="0.18" filter="url(#soft)" class="sun"/>

  <g class="seal-ring">
    <circle cx="132" cy="165" r="72" stroke="#B38B42" stroke-width="1.5" stroke-dasharray="3 7"/>
    <path d="M132 85L139 98L154 94L153 109L168 112L160 126L171 136L157 145L163 160L148 165L149 181L133 179L125 193L114 182L101 190L96 175L80 176L84 160L71 152L83 140L76 126L92 121L92 105L108 108L116 93L128 102Z" stroke="#1C2733" stroke-opacity="0.35"/>
  </g>
  <circle cx="132" cy="165" r="54" fill="#17212A"/>
  <text x="132" y="179" text-anchor="middle" fill="#F8F4EA" font-family="Georgia,serif" font-size="42" font-weight="700">PA</text>

  <text x="245" y="105" fill="#17212A" font-family="Georgia,Times New Roman,serif" font-size="66" font-weight="700">Praful A</text>
  <text x="249" y="145" fill="#66727A" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="13" letter-spacing="4">DIGITAL ATELIER  /  PRODUCT ENGINEERING</text>
  <path d="M248 171H1055" stroke="#D7CCB7"/>

  <g fill="#314553" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="24" font-weight="560">
    <text x="249" y="220" class="phrase-a">I turn ambitious ideas into useful software.</text>
    <text x="249" y="220" class="phrase-b">I build with clarity, privacy, and intent.</text>
    <text x="249" y="220" class="phrase-c">I learn deeply, ship carefully, and keep refining.</text>
  </g>

  <path d="M249 269C370 239 456 297 576 268C701 238 808 295 1057 257" stroke="url(#ink)" stroke-width="2" stroke-linecap="round" class="ink-line"/>
  <circle cx="249" cy="269" r="4" fill="#1C2733"/><circle cx="1057" cy="257" r="4" fill="#B38B42"/>
  <g fill="#8B7754"><circle cx="1091" cy="95" r="2"/><circle cx="1110" cy="112" r="1.5"/><circle cx="1082" cy="124" r="1"/></g>
</svg>
