<svg width="1200" height="230" viewBox="0 0 1200 230" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Praful's product process: observe, sketch, build, refine, ship">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1200" y2="230"><stop stop-color="#FBF8F1"/><stop offset="1" stop-color="#F1F5F4"/></linearGradient>
    <linearGradient id="thread" x1="90" y1="0" x2="1110" y2="0"><stop stop-color="#27485C"/><stop offset=".55" stop-color="#6F8FA3"/><stop offset="1" stop-color="#B58D45"/></linearGradient>
  </defs>
  <style>
    .thread{stroke-dasharray:14 10;animation:flow 15s linear infinite}.mark{animation:lift 4s ease-in-out infinite}.m2{animation-delay:.7s}.m3{animation-delay:1.4s}.m4{animation-delay:2.1s}.m5{animation-delay:2.8s}
    @keyframes flow{to{stroke-dashoffset:-480}}@keyframes lift{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    @media(prefers-reduced-motion:reduce){.thread,.mark{animation:none}}
  </style>
  <rect x="8" y="8" width="1184" height="214" rx="26" fill="url(#paper)" stroke="#D6C9B2"/>
  <text x="60" y="56" fill="#8A7653" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="12" letter-spacing="3">FROM FIRST QUESTION TO SHIPPED PRODUCT</text>
  <path d="M100 130C230 98 314 157 430 126C561 91 649 155 766 124C894 90 978 148 1100 112" stroke="url(#thread)" stroke-width="2.5" stroke-linecap="round" class="thread"/>
  <g font-family="Inter,Segoe UI,Arial,sans-serif" text-anchor="middle">
    <g class="mark"><circle cx="120" cy="126" r="32" fill="#E7EEF0" stroke="#7892A0"/><text x="120" y="132" fill="#203847" font-size="16" font-weight="700">01</text><text x="120" y="185" fill="#3E4C54" font-size="14">Observe</text></g>
    <g class="mark m2"><circle cx="350" cy="134" r="32" fill="#F1EBDD" stroke="#B39A67"/><text x="350" y="140" fill="#51442E" font-size="16" font-weight="700">02</text><text x="350" y="185" fill="#3E4C54" font-size="14">Sketch</text></g>
    <g class="mark m3"><circle cx="580" cy="123" r="32" fill="#E4ECE7" stroke="#789582"/><text x="580" y="129" fill="#294336" font-size="16" font-weight="700">03</text><text x="580" y="185" fill="#3E4C54" font-size="14">Build</text></g>
    <g class="mark m4"><circle cx="810" cy="122" r="32" fill="#E9E7EE" stroke="#8D819B"/><text x="810" y="128" fill="#40364A" font-size="16" font-weight="700">04</text><text x="810" y="185" fill="#3E4C54" font-size="14">Refine</text></g>
    <g class="mark m5"><circle cx="1060" cy="115" r="32" fill="#F3E9D3" stroke="#B58D45"/><text x="1060" y="121" fill="#604A25" font-size="16" font-weight="700">05</text><text x="1060" y="185" fill="#3E4C54" font-size="14">Ship</text></g>
  </g>
</svg>
