<svg width="580" height="300" viewBox="0 0 580 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="HUSTI savings calendar project illustration">
  <defs><linearGradient id="bg" x1="0" y1="0" x2="580" y2="300"><stop stop-color="#F8F5EA"/><stop offset="1" stop-color="#DDEADD"/></linearGradient><linearGradient id="coin" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#F2D17D"/><stop offset="1" stop-color="#B78B2E"/></linearGradient></defs>
