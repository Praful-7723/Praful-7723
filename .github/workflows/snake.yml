name: Generate contribution animation

on:
  schedule:
    - cron: "19 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Generate light and dark contribution snakes
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%238B5CF6&color_dots=%23EBEDF0,%23DDD6FE,%23C4B5FD,%238B5CF6,%236D28D9
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%23F8C15C&color_dots=%23161B22,%23312E81,%234F46E5,%237C3AED,%23A78BFA

      - name: Publish generated assets
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
